name: ResX News Bot

on:
  schedule:
    # Runs Mon and Fri at 8am ET (13:00 UTC)
    - cron: "0 13 * * 1,5"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write # needed to commit data files back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python bot.py

      - name: Commit updated data files
        run: |
          git config user.name "resx-digest-bot"
          git config user.email "bot@resx.app"
          git add data/seen_openings.json data/competitors.json
          git diff --cached --quiet || git commit -m "bot: update seen openings + competitors [skip ci]"
          git push
